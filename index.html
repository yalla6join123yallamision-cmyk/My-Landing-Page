<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Maker — Grove Medical</title>
<meta name="description" content="Grove Medical: clinic appointment booking. Online booking, verified sign-up, urgent cases flagged automatically.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&family=Tajawal:wght@400;500;700&family=Aref+Ruqaa:wght@400;700&family=Poppins:wght@400;500;600;900&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FCFBF7; --rule:#C6D6EA; --margin:#CE5A50; --ink:#33425E;
  --navy:#0B2E5C; --deep:#061A34; --blue:#3B82F6; --sky:#93C5FD;
  --slate:#5A6779; --line:#E4E9F0; --bg:#fff; --panelText:#DCE6F5;
  --sp:clamp(56px,7vw,104px);
  --display:'Cairo',sans-serif; --body:'Tajawal',sans-serif; --hand:'Aref Ruqaa',serif;
}
html[lang="en"]{--display:'Poppins',sans-serif;--body:'Poppins',sans-serif;--hand:'Caveat',cursive}
html[data-theme="dark"]{
  --bg:#050F20; --navy:#EAF1FB; --deep:#02080F; --line:#1B2C46; --slate:#9DB0C9;
  --paper:#0B1728; --rule:#22354F; --ink:#C7D6EA; --margin:#E27F76;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--navy);font-family:var(--body);font-size:17px;line-height:1.75;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
h1,h2,h3{font-family:var(--display);font-weight:900;line-height:1.18;letter-spacing:-.01em}
.wrap{width:min(1180px,92vw);margin-inline:auto}
section{padding-block:var(--sp)}

nav{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line)}
nav .wrap{display:flex;align-items:center;gap:14px;height:70px}
nav>.wrap>img{height:38px;width:auto}
.brand b{font-family:var(--display);font-weight:900;font-size:19px;letter-spacing:.02em;display:block;line-height:1.1}
.brand span{font-size:11px;color:var(--blue);letter-spacing:.16em;font-weight:500}
.spacer{margin-inline-start:auto}
.switches{display:flex;gap:8px;align-items:center}
.sw{display:flex;border:1.5px solid var(--line);border-radius:999px;overflow:hidden}
.sw button{font-family:var(--body);font-weight:700;font-size:12.5px;letter-spacing:.04em;padding:7px 13px;background:none;border:none;color:var(--slate);cursor:pointer;transition:.2s}
.sw button[aria-pressed="true"]{background:var(--navy);color:var(--bg)}
.btn{display:inline-block;background:var(--navy);color:var(--bg);text-decoration:none;font-family:var(--display);font-weight:600;font-size:16px;padding:13px 26px;border-radius:999px;transition:transform .18s,background .18s,color .18s}
.btn:hover{background:var(--blue);color:#fff;transform:translateY(-2px)}
.btn.ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
.btn.ghost:hover{background:var(--navy);color:var(--bg)}

.hero{padding-block:clamp(48px,6vw,88px) var(--sp)}
.hero .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(32px,5vw,72px);align-items:center}
.eyebrow{font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.14em;color:var(--blue);margin-bottom:18px}
.hero h1{font-size:clamp(34px,5.4vw,62px)}
.hero h1 em{font-style:normal;color:var(--margin);text-decoration:line-through;text-decoration-thickness:4px}
.lead{font-size:clamp(17px,2vw,21px);color:var(--slate);margin-top:22px;max-width:34ch}
.cta{display:flex;gap:14px;flex-wrap:wrap;margin-top:34px}
.stamp{margin-top:30px;font-size:14px;color:var(--slate);border-inline-start:3px solid var(--blue);padding-inline-start:14px}
.stamp b{color:var(--navy)}

.book{position:relative;background:var(--paper);border-radius:4px;box-shadow:0 1px 0 var(--line),0 26px 60px -24px rgba(11,46,92,.4);padding:26px 22px 26px 30px;overflow:hidden;transition:background .4s}
.book::before{content:"";position:absolute;inset-block:0;inset-inline-end:44px;width:1.5px;background:var(--margin);opacity:.55;transition:opacity .4s}
.row{position:relative;display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--rule);font-family:var(--hand);font-size:19px;color:var(--ink);transition:all .55s cubic-bezier(.4,0,.2,1)}
html[lang="en"] .row{font-size:23px}
.row .t{margin-inline-start:auto;font-family:var(--body);font-size:14px;opacity:.6}
.row.struck{text-decoration:line-through;opacity:.45}
.row.tilt{transform:rotate(-.5deg)}
.row.urgent{font-family:var(--display);font-weight:600;font-size:17px}
html[lang="en"] .row.urgent{font-size:16px}
.tag{font-family:var(--body);font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:color-mix(in srgb,var(--margin) 18%,var(--paper));color:var(--margin);letter-spacing:.04em}
.cap{margin-top:18px;font-family:var(--body);font-size:13px;color:var(--slate)}
.book.lifted{background:var(--bg)}
.book.lifted::before{opacity:0}
.book .rows{display:flex;flex-direction:column}
.book.lifted .row.urgent{order:-1;background:var(--bg);color:var(--navy);border:1.5px solid var(--blue);border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 14px 30px -12px rgba(59,130,246,.55)}
.book.lifted .row.urgent .tag{background:var(--blue);color:#fff}
.book.lifted .row:not(.urgent){border-bottom:1px solid var(--line);font-family:var(--body);font-size:15px;text-decoration:none;opacity:.85;transform:none}
.lift-note{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:13.5px;color:var(--slate)}
.lift-note button{font-family:var(--body);font-weight:700;font-size:13.5px;color:var(--blue);background:none;border:none;cursor:pointer;border-bottom:1.5px dashed var(--blue);padding:0 0 2px}

.problems{background:var(--paper);border-block:1px solid var(--rule)}
.problems h2{font-size:clamp(27px,3.6vw,42px);max-width:17ch}
.problems .intro{color:var(--slate);margin-top:14px;max-width:48ch}
.plist{margin-top:52px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule)}
.p{background:var(--paper);padding:30px 26px}
.p h3{font-size:19px;margin-bottom:9px}
.p p{font-size:15.5px;color:var(--slate);line-height:1.7}
.p .n{font-family:var(--display);font-weight:900;font-size:13px;color:var(--margin);opacity:.7;display:block;margin-bottom:12px}

.sol{background:var(--deep);color:var(--panelText)}
.sol h2{color:#fff;font-size:clamp(27px,3.6vw,44px);max-width:19ch}
.sol .kicker{color:var(--sky);font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.14em;margin-bottom:16px}
.feat{margin-top:56px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:34px 40px}
.f{border-top:2px solid rgba(147,197,253,.3);padding-top:22px}
.f h3{color:#fff;font-size:19px;margin-bottom:10px}
.f p{font-size:15.5px;color:#A9BDD8;line-height:1.75}
.f .k{font-family:var(--body);font-size:12px;font-weight:700;color:var(--sky);letter-spacing:.06em;display:block;margin-bottom:14px}

.proof .card{border:1.5px solid var(--navy);border-radius:20px;padding:clamp(30px,4vw,52px);display:grid;grid-template-columns:1fr auto;gap:34px;align-items:center}
.proof h2{font-size:clamp(25px,3.2vw,38px);margin-bottom:16px}
.proof p{color:var(--slate);max-width:50ch}
.badge{text-align:center;border-inline-start:1px solid var(--line);padding-inline-start:34px}
.badge b{display:block;font-family:var(--display);font-weight:900;font-size:clamp(38px,5vw,58px);color:var(--blue);line-height:1}
.badge span{font-size:13px;color:var(--slate)}

.end{background:var(--deep);text-align:center}
.end h2{color:#fff;font-size:clamp(28px,4vw,48px);max-width:21ch;margin-inline:auto}
.end p{color:#A9BDD8;margin-top:16px}
.end .btn{background:#fff;color:#0B2E5C;margin-top:32px;font-size:17px;padding:16px 38px}
.end .btn:hover{background:var(--sky);color:#0B2E5C}
.end .num{display:block;margin-top:18px;font-size:14px;color:#7E93B4;letter-spacing:.05em}
footer .wrap{padding-block:34px;font-size:13.5px;color:var(--slate);display:flex;gap:16px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--line)}
footer img{height:26px}

@media(max-width:880px){
  .hero .grid,.proof .card{grid-template-columns:1fr}
  .badge{border-inline-start:none;border-top:1px solid var(--line);padding:24px 0 0}
  .brand span{display:none}
  nav .wrap{gap:10px}
  nav>.wrap>.btn{display:none}
}
@media(max-width:420px){.brand b{font-size:15px}.sw button{padding:6px 9px;font-size:11.5px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:3px solid var(--blue);outline-offset:3px}
</style>
</head>

ph:"الدفتر شغال — لحد ما يقف.",pintro:"دي المشاكل اللي بتحصل كل يوم في أغلب العيادات، ومحدش بيحسبها.",
p1h:"التليفون خط واحد",p1p:"لما الموظف يكون مع مريض، التليفون بيرن ومحدش بيرد. كل مكالمة ضايعة دي مريض راح لعيادة تانية — والعيادة أصلاً مش بتعرف إنها خسرته.",
p2h:"نسخة واحدة بس",p2p:"الدفتر قاعد على المكتب. لو ضاع أو اتقطع أو حد أخده بالغلط، الجدول كله راح. مفيش نسخة تانية ومفيش بحث.",
p3h:"الخط اليدوي مش بيانات",p3p:"اسم متكتب بسرعة الصبح مش بيتقري بالليل. ورقم غلط برقم واحد يعني المريض ضاع خلاص — ومحدش بيكتشف ده غير لما الميعاد يفوت.",
p4h:"المستعجل بيستنى دوره",p4p:"في الدفتر كل السطور شكلها واحد. المتابعة العادية والحالة الخطيرة بياخدوا نفس السطر، فالمريض بيتشاف بترتيب مين اتصل الأول.",
p5h:"حجز مزدوج",p5p:"اتنين بيكتبوا في نفس الميعاد، أو ميعاد بيتشطب ويتكتب تاني لحد ما محدش يعرف الصح فين.",
p6h:"مفيش أرقام",p6p:"كام مريض جه الشهر ده؟ أنهي يوم أزحم؟ كام واحد مرجعش؟ محدش يعرف — فكل قرار بيتاخد بالتخمين.",
sh:"نفس الجدول — بس شغال لوحده.",
f1k:"الحجز",f1h:"المريض بيحجز بنفسه",f1p:"من تليفونه، من غير مكالمة ومن غير ما يستنى حد يرد. الحجز بيوصل الساعة ١١ بالليل زي الساعة ١٠ الصبح.",
f2k:"التأكيد",f2h:"إيميل حقيقي لكل تسجيل",f2p:"كود بيتبعت للمريض ولازم يكتبه قبل ما الحجز يتأكد. الخطوة دي لوحدها بتقضي على الحجوزات الوهمية والمكررة والأرقام الغلط.",
f3k:"الأولوية",f3h:"المستعجل بيطلع فوق",f3p:"الحجز بيتحدد كمستعجل فيطلع أول القايمة قدام الموظف على طول. الأولوية بقت على حسب الحالة، مش على حسب مين اتصل الأول.",
f4k:"السجل",f4h:"مفيش حاجة بتضيع",f4p:"كل حجز بيتخزن. بيانات المرضى وتاريخ المواعيد وأرقام التواصل موجودة وينفع تتبحث، مش مدفونة في كوم ورق.",
f5k:"الأرقام",f5h:"تعرف عيادتك ماشية إزاي",f5p:"الحجوزات في اليوم، أزحم الساعات، المرضى اللي بيرجعوا — قدامك بدل التخمين.",
f6k:"التشغيل",f6h:"مش محتاج تدريب",f6p:"اللي بيعرف يستخدم واتساب هيعرف يستخدمه. والتركيب يوم واحد، مش شهر.",

const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
const book=$('#book'),cap=$('#cap'),tog=$('#toggle');
let lang='ar', lifted=false;

function paint(){
  const d=T[lang];
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  $$('[data-t]').forEach(el=>{el.innerHTML=d[el.dataset.t]??''});
  cap.textContent=lifted?d.capB:d.capA;
  tog.textContent=lifted?d.swOff:d.swOn;
  $('#ar').setAttribute('aria-pressed',lang==='ar');
  $('#en').setAttribute('aria-pressed',lang==='en');
}
function flip(v){lifted=v;book.classList.toggle('lifted',v);paint()}
function theme(t){
  document.documentElement.dataset.theme=t;
  $('#lt').setAttribute('aria-pressed',t==='light');
  $('#dk').setAttribute('aria-pressed',t==='dark');
}
$('#ar').onclick=()=>{lang='ar';paint()};
$('#en').onclick=()=>{lang='en';paint()};
$('#lt').onclick=()=>theme('light');
$('#dk').onclick=()=>theme('dark');
tog.onclick=()=>flip(!lifted);

if(matchMedia('(prefers-color-scheme: dark)').matches)theme('dark');
if((navigator.language||'').slice(0,2)!=='ar')lang='en';
paint();
new IntersectionObserver(e=>{if(e[0].isIntersecting&&!lifted)setTimeout(()=>flip(true),900)},{threshold:.6}).observe(book);
</script>
